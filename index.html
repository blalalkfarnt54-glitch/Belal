
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة التحدي المربحة</title>
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; padding: 20px; margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .card { background: rgba(255, 255, 255, 0.1); padding: 30px; border-radius: 15px; backdrop-filter: blur(10px); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); max-width: 400px; width: 90%; }
        h1 { font-size: 22px; margin-bottom: 20px; }
        .btn { background: #0088cc; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 18px; width: 100%; margin: 10px 0; transition: 0.3s; font-weight: bold; }
        .btn:hover { background: #00a2f3; }
        .ad-box { margin-top: 25px; padding: 15px; background: rgba(0, 0, 0, 0.4); border: 2px dashed #0088cc; border-radius: 8px; font-size: 14px; color: #00a2f3; }
    </style>
</head>
<body>

    <div class="card">
        <h1>سؤال اليوم: ما هو اللقب الذي أطلق على عمر بن الخطاب رضي الله عنه؟</h1>
        <button class="btn" onclick="checkAnswer('الفاروق')">A) الفاروق</button>
        <button class="btn" onclick="checkAnswer('الصديق')">B) الصديق</button>
        <button class="btn" onclick="checkAnswer('ذو النورين')">C) ذو النورين</button>
        
        <div class="ad-box">مساحة إعلانية مدعومة بواسطة AdsGram</div>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        function checkAnswer(answer) {
            if(answer === 'الفاروق') {
                alert("إجابة صحيحة عبقري! 🎉 شاهد الإعلان التالي للحصول على محاولات جديدة.");
            } else {
                alert("للأسف إجابة خاطئة! حاول مجدداً.");
            }
        }
    </script>
</body>
</html>
